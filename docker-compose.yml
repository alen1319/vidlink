services:
  vidlink:
    build: .
    image: vidlink:latest
    container_name: vidlink
    restart: unless-stopped
    # Bind to localhost only; put nginx/caddy in front for TLS + the domain.
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      # Uncomment and fill to enable ads:
      # - NEXT_PUBLIC_ADSENSE_CLIENT=ca-pub-xxxxxxxxxxxxxxxx
      # - NEXT_PUBLIC_ADSENSE_SLOT_TOP=1234567890
      # - NEXT_PUBLIC_ADSENSE_SLOT_BOTTOM=0987654321
      - MAX_CONCURRENT_DOWNLOADS=2
      - MAX_FILESIZE=1G
      # Cookies file (mounted below) to authenticate yt-dlp for YouTube etc.
      - YT_DLP_COOKIES=/cookies/cookies.txt
      - YT_DLP_POT_PROVIDER_URL=http://pot-provider:4416
    depends_on:
      pot-provider:
        condition: service_started
    volumes:
      # Put a Netscape-format cookies.txt in ./cookies/ on the host.
      # Read-only mount; updating the file needs no rebuild, just a restart.
      - ./cookies:/cookies:ro
    # Downloads land in a temp dir; keep it on fast storage / tmpfs if desired.
    tmpfs:
      - /tmp:size=3g
    pids_limit: 128
    mem_limit: 6g
    cpus: 1.75
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - provider
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Telegram bot: same image, different entrypoint. Long-polls Telegram, so it
  # needs no inbound port and sits behind the firewall untouched.
  bot:
    build: .
    image: vidlink:latest
    container_name: vidlink-bot
    restart: unless-stopped
    command: ["node", "bot/index.mjs"]
    environment:
      - NODE_ENV=production
      # Set BOT_TOKEN in .env next to this file (git-ignored).
      - BOT_TOKEN=${BOT_TOKEN:?BOT_TOKEN is required — put it in .env}
      - SITE_URL=https://vidlink.app
      - MINIAPP_URL=https://bot.vidlink.app
      - BOT_MAX_CONCURRENT=2
      - YT_DLP_COOKIES=/cookies/cookies.txt
      - YT_DLP_POT_PROVIDER_URL=http://pot-provider:4416
    depends_on:
      pot-provider:
        condition: service_started
    volumes:
      - ./cookies:/cookies:ro
    read_only: true
    tmpfs:
      - /tmp:size=512m
    pids_limit: 128
    mem_limit: 2g
    cpus: 1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "const fs=require('fs');const t=Number(fs.readFileSync('/tmp/bot.ready','utf8'));process.exit(Date.now()-t<90000?0:1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - bot-provider

  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1@sha256:1aaa43a0ca72dfca6a6d2129a0fb4a23465c25adb1b043f8aff829a20825646b
    container_name: vidlink-pot-provider
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=128m
    pids_limit: 64
    mem_limit: 512m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - provider
      - bot-provider

networks:
  provider:
  bot-provider:
